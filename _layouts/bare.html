<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% assign document_title = page.browser_title | default: page.title %}
    {% if document_title %}
    <title>{{ document_title | escape }}</title>
    {% endif %}
    <style>
      body {
        margin: 0;
        color: #111;
        background: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 16px;
        line-height: 1.55;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 24px 72px;
      }

      h1, h2, h3, h4, h5, h6 {
        line-height: 1.2;
      }

      h1 {
        font-size: 32px;
        margin: 0 0 16px;
      }

      h4 {
        margin-top: 32px;
      }

      h5 {
        margin: 0 0 24px;
        font-size: 15px;
        font-weight: 600;
      }

      a {
        color: #0366d6;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin: 16px 0 24px;
      }

      td {
        border: 1px solid #ddd;
        padding: 10px 12px;
      }

      details {
        margin: 16px 0;
      }

      summary {
        cursor: pointer;
      }

      pre {
        overflow-x: auto;
        padding: 16px;
        background: #f6f8fa;
      }
    </style>
  </head>
  <body>
    <main>
      {{ content }}
    </main>
  </body>
</html>
